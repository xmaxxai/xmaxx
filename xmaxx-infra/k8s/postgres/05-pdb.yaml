# PodDisruptionBudget protects the single database pod from voluntary eviction.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: postgres
  namespace: database
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
