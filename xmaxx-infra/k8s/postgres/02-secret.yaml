# Database bootstrap secret.
# POSTGRES_PASSWORD is intentionally injected from the local .env file at apply time:
#   set -a && source .env && set +a
#   envsubst < xmaxx-infra/k8s/postgres/02-secret.yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: postgres
  namespace: database
type: Opaque
stringData:
  POSTGRES_DB: appdb
  POSTGRES_USER: appuser
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
