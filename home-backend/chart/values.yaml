namespace: home

replicaCount: 1

image:
  repository: 351381968847.dkr.ecr.us-east-2.amazonaws.com/xmaxx/home-backend
  tag: backend-latest
  pullPolicy: Always

imagePullSecrets: []

imageAutomation:
  enabled: true
  schedule: "*/5 * * * *"
  awsRegion: us-east-2
  checkerImage: public.ecr.aws/aws-cli/aws-cli:2.27.37
  kubectlVersion: v1.32.3

service:
  port: 8000

resources: {}

env:
  postgresHost: postgres.database.svc.cluster.local
  postgresPort: "5432"
  postgresConnMaxAge: "60"
  djangoDebug: "false"
  djangoAllowedHosts: "localhost,127.0.0.1,xmaxx.ai,home-backend,home-backend.home.svc,home-backend.home.svc.cluster.local"
  djangoCsrfTrustedOrigins: "https://xmaxx.ai"
  djangoTimeZone: UTC
  githubOauthRedirectUri: "https://xmaxx.ai/api/auth/github/callback/"
  githubOauthScopes: "read:user,user:email"
  googleOauthRedirectUri: "https://xmaxx.ai/api/auth/google/callback/"
  googleOauthScopes: "openid,email,profile"
  stripeSuccessUrl: "https://xmaxx.ai/profile?checkout=success"
  stripeCancelUrl: "https://xmaxx.ai/?checkout=cancel"
  xmaxxBillingMode: "one_time"
  xmaxxSalesNotifyEmail: ""
  runMigrationsOnStartup: "true"
  databaseStartupMaxAttempts: "60"
  databaseStartupDelaySeconds: "2"

secrets:
  postgresDb: ""
  postgresUser: ""
  postgresPassword: ""
  djangoSecretKey: ""
  githubWebhookSecret: ""
  githubOauthClientId: ""
  githubOauthClientSecret: ""
  googleOauthClientId: ""
  googleOauthClientSecret: ""
  stripeSecretKey: ""
  stripeWebhookSecret: ""
  stripePriceId: ""
  xmaxxSalesNotifyDiscordWebhookUrl: ""
