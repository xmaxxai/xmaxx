name: Build And Push To ECR

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-and-push-ecr.yml"
      - "home/**"
      - "home-backend/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-2
  AWS_ROLE_ARN: arn:aws:iam::351381968847:role/xmaxx-github-actions-ecr-push
  ECR_REGISTRY: 351381968847.dkr.ecr.us-east-2.amazonaws.com

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: home
            context: ./home
            repository: xmaxx/home
            latest_tag: latest
          - name: home-backend
            context: ./home-backend
            repository: xmaxx/home-backend
            latest_tag: backend-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          provenance: false
          sbom: false
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ matrix.repository }}:${{ matrix.latest_tag }}
            ${{ env.ECR_REGISTRY }}/${{ matrix.repository }}:sha-${{ github.sha }}
