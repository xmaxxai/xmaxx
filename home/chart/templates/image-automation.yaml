{{- $automation := .Values.imageAutomation | default dict }}
{{- if ($automation.enabled | default false) }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "home.fullname" . }}-image-automation
  namespace: {{ .Values.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "home.fullname" . }}-image-automation
  namespace: {{ .Values.namespace }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "home.fullname" . }}-image-automation
  namespace: {{ .Values.namespace }}
subjects:
  - kind: ServiceAccount
    name: {{ include "home.fullname" . }}-image-automation
    namespace: {{ .Values.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "home.fullname" . }}-image-automation
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "home.fullname" . }}-image-automation
  namespace: {{ .Values.namespace }}
spec:
  schedule: {{ ($automation.schedule | default "*/5 * * * *") | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: {{ include "home.fullname" . }}-image-automation
          restartPolicy: OnFailure
          containers:
            - name: image-automation
              image: {{ ($automation.checkerImage | default "public.ecr.aws/aws-cli/aws-cli:2.27.37") | quote }}
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -lc
                - |
                  set -eu

                  ARCH="$(uname -m)"
                  case "$ARCH" in
                    x86_64) KUBECTL_ARCH="amd64" ;;
                    aarch64|arm64) KUBECTL_ARCH="arm64" ;;
                    *)
                      echo "unsupported architecture: $ARCH" >&2
                      exit 1
                      ;;
                  esac

                  curl -fsSL -o /usr/local/bin/kubectl \
                    "https://dl.k8s.io/release/{{ $automation.kubectlVersion | default "v1.32.3" }}/bin/linux/${KUBECTL_ARCH}/kubectl"
                  chmod +x /usr/local/bin/kubectl

                  DEPLOYMENT_NAME="{{ include "home.fullname" . }}"
                  NAMESPACE="{{ .Values.namespace }}"
                  REPOSITORY_NAME="{{ include "home.ecrRepositoryName" . }}"
                  IMAGE_TAG="{{ .Values.image.tag }}"
                  IMAGE_DIGEST="$(
                    aws ecr describe-images \
                      --region {{ ($automation.awsRegion | default "us-east-2") | quote }} \
                      --repository-name "$REPOSITORY_NAME" \
                      --image-ids imageTag="$IMAGE_TAG" \
                      --query 'imageDetails[0].imageDigest' \
                      --output text
                  )"
                  CURRENT_DIGEST="$(
                    kubectl get deployment "$DEPLOYMENT_NAME" -n "$NAMESPACE" \
                      -o jsonpath='{.metadata.annotations.xmaxx\.ai/image-digest}'
                  )"

                  if [ "$IMAGE_DIGEST" = "$CURRENT_DIGEST" ]; then
                    echo "deployment already at digest $IMAGE_DIGEST"
                    exit 0
                  fi

                  kubectl annotate deployment "$DEPLOYMENT_NAME" -n "$NAMESPACE" \
                    xmaxx.ai/image-digest="$IMAGE_DIGEST" \
                    --overwrite
                  kubectl rollout restart deployment/"$DEPLOYMENT_NAME" -n "$NAMESPACE"
                  kubectl rollout status deployment/"$DEPLOYMENT_NAME" -n "$NAMESPACE" --timeout=10m
{{- end }}
